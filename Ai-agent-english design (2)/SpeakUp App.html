<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeakUp — AI English Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: oklch(0.985 0.005 275);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: oklch(0.55 0.22 275 / 0.2); }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: oklch(0.8 0.01 275); border-radius: 3px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#6366f1"
    }/*EDITMODE-END*/;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/shared.jsx"></script>
  <script type="text/babel" src="app/Lessons.jsx"></script>
  <script type="text/babel" src="app/CustomPractice.jsx"></script>
  <script type="text/babel" src="app/Conversation.jsx"></script>
  <script type="text/babel" src="app/History.jsx"></script>
  <script type="text/babel" src="app/Progress.jsx"></script>
  <script type="text/babel" src="app/Vocabulary.jsx"></script>
  <script type="text/babel" src="app/Settings.jsx"></script>

  <script type="text/babel">
    const NAV_ITEMS = [
      { id: 'lessons', label: 'Lessons', icon: '📚' },
      { id: 'practice', label: 'Practice', icon: '🎙️' },
      { id: 'history', label: 'History', icon: '📋' },
      { id: 'progress', label: 'Progress', icon: '📈' },
      { id: 'vocabulary', label: 'Vocab', icon: '💬' },
      { id: 'settings', label: 'Settings', icon: '⚙️' },
    ];

    function AppNavbar({ page, navigate }) {
      const [hovered, setHovered] = React.useState(null);
      const isConversation = page === 'conversation';

      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, height: 64, zIndex: 100,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 clamp(16px, 3vw, 40px)',
          background: 'oklch(0.985 0.005 275 / 0.92)',
          backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
          borderBottom: '1px solid oklch(0.9 0.01 275)',
          boxShadow: '0 2px 20px oklch(0.55 0.22 275 / 0.04)',
        }}>
          <a onClick={() => navigate('lessons')} style={{
            display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none', cursor: 'pointer',
          }}>
            <div style={{
              width: 34, height: 34, borderRadius: 10,
              background: 'oklch(0.55 0.22 275)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: '#fff', fontWeight: 700, fontSize: 16, fontFamily: "'Space Grotesk', sans-serif",
            }}>S</div>
            <span style={{
              fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700,
              fontSize: 20, color: 'oklch(0.18 0.02 275)', letterSpacing: -0.5,
            }}>SpeakUp</span>
          </a>

          {!isConversation && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 2 }}>
              {NAV_ITEMS.map(item => {
                const active = page === item.id;
                const h = hovered === item.id;
                return (
                  <button key={item.id}
                    onClick={() => navigate(item.id)}
                    onMouseEnter={() => setHovered(item.id)}
                    onMouseLeave={() => setHovered(null)}
                    style={{
                      fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 500,
                      padding: '8px 14px', borderRadius: 10, border: 'none',
                      cursor: 'pointer', transition: 'all 0.2s',
                      background: active ? 'oklch(0.55 0.22 275 / 0.1)' : h ? 'oklch(0.55 0.22 275 / 0.05)' : 'transparent',
                      color: active ? 'oklch(0.55 0.22 275)' : 'oklch(0.45 0.02 275)',
                      display: 'flex', alignItems: 'center', gap: 6,
                    }}
                  >
                    <span style={{ fontSize: 16 }}>{item.icon}</span>
                    <span className="nav-label">{item.label}</span>
                  </button>
                );
              })}
            </div>
          )}

          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{
              width: 36, height: 36, borderRadius: '50%',
              background: 'linear-gradient(135deg, oklch(0.55 0.22 275), oklch(0.70 0.18 30))',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: '#fff', fontSize: 14, fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif",
              cursor: 'pointer',
            }}>PS</div>
          </div>
        </nav>
      );
    }

    function App() {
      const [page, setPage] = React.useState('lessons');
      const [navContext, setNavContext] = React.useState(null);

      function navigate(p, ctx) {
        setPage(p);
        setNavContext(ctx || null);
        window.scrollTo(0, 0);
      }

      const pageContent = {
        lessons: <LessonsPage navigate={navigate} />,
        practice: <CustomPracticePage navigate={navigate} />,
        conversation: <ConversationPage navigate={navigate} context={navContext} />,
        history: <SessionHistoryPage navigate={navigate} />,
        progress: <ProgressPage />,
        vocabulary: <VocabularyPage />,
        settings: <SettingsPage />,
      };

      return (
        <React.Fragment>
          <AppNavbar page={page} navigate={navigate} />
          <main style={{
            marginTop: 64,
            padding: page === 'conversation' ? '32px 32px 0' : 'clamp(24px, 4vw, 40px) clamp(16px, 4vw, 60px)',
            maxWidth: page === 'conversation' ? '100%' : 1100,
            margin: page === 'conversation' ? '64px auto 0' : '64px auto 0',
            animation: 'fadeSlideUp 0.4s ease',
          }} key={page}>
            {pageContent[page]}
          </main>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <style>
    @media (max-width: 700px) {
      .nav-label { display: none; }
    }
  </style>
</body>
</html>
