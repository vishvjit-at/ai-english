<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeakUp — AI English Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: oklch(0.985 0.005 275);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: oklch(0.55 0.22 275 / 0.2); }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes waveBar {
      0% { transform: scaleY(0.4); }
      100% { transform: scaleY(1); }
    }
    @keyframes pulseRing {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0; }
    }
    @keyframes floatBubble {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    @media (max-width: 840px) {
      .orb-container { display: none !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentHue": 275,
      "warmAccent": true,
      "dotGrid": true,
      "cursorGlow": true,
      "orbVisible": true
    }/*EDITMODE-END*/;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/Navbar.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Sections.jsx"></script>
  <script type="text/babel" src="components/Background.jsx"></script>

  <script type="text/babel">
    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <React.Fragment>
          {tweaks.dotGrid && <DotGrid />}
          {tweaks.cursorGlow && <CursorGlow />}
          <div style={{ position: 'relative', zIndex: 2 }}>
            <Navbar />
            <Hero />
            <Features />
            <HowItWorks />
            <CTASection />
            <Footer />
          </div>
          <TweaksPanel title="SpeakUp Tweaks">
            <TweakToggle label="Interactive dot grid" value={tweaks.dotGrid} onChange={v => setTweak('dotGrid', v)} />
            <TweakToggle label="Cursor glow effect" value={tweaks.cursorGlow} onChange={v => setTweak('cursorGlow', v)} />
            <TweakToggle label="AI Orb visible" value={tweaks.orbVisible} onChange={v => setTweak('orbVisible', v)} />
            <TweakToggle label="Warm accent (orange)" value={tweaks.warmAccent} onChange={v => setTweak('warmAccent', v)} />
          </TweaksPanel>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
