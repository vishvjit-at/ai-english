services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-english-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipass
      POSTGRES_DB: ai_english
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: ai-english-server
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      CLIENT_URL: "http://localhost:3000"
      DATABASE_URL: "postgresql://aiuser:aipass@postgres:5432/ai_english"
    env_file:
      - ./server/.env.docker

  client:
    build: ./client
    container_name: ai-english-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  pgdata:
